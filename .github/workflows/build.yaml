name: Simple Build Test

on:
  push:
  pull_request:
  schedule:
    - cron: '0 21 * * *' # Run it every day at 9pm UTC

jobs:
  simple-build:
    strategy:
      fail-fast: false
      matrix:
        board:
          - scobc_v1/miv
        python-version:
          - '3.12'
          - '3.13'
        os:
          - ubuntu-24.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Python version
        run: |
          python3 --version

      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: scobc-sp

      - name: Setup Zephyr
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: scobc-sp
          toolchains: riscv64-zephyr-elf

      - name: Build
        run: |
          west build -b ${{ matrix.board }} scobc-sp

  status-check:
    runs-on: ubuntu-latest
    needs: simple-build
    steps:
      - name: All test passed
        run: echo Ready to merge
